<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>海洋共生體 | Symbiosis 27.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;600;900&family=Montserrat:wght@100;400;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>

    <style>
        :root {
            --m-black: #00050a;
            --m-blue: #001220;
            --accent: #00f2ff;
            --gold: #feb47b;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: "Noto Serif TC", serif; background: var(--m-black); color: #fff;
            overflow: hidden;
        }

        /* --- 向外擴散的呼吸燈（Outer Glow） --- */
        @keyframes glow-outer {
            0%, 100% { filter: drop-shadow(0 0 5px var(--accent)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 20px var(--accent)); opacity: 1; }
        }

        /* 1. 儀式入口 */
        #mirror-gate {
            position: absolute; inset: 0; z-index: 100000;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mirror-portal {
            width: 200px; height: 200px; border-radius: 50%;
            background: url('https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=600') center/cover;
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.2);
            animation: glow-outer 4s infinite ease-in-out;
        }

        /* 2. 轉化動畫層 (敘事載體) */
        #anim-overlay {
            position: absolute; inset: 0; z-index: 90000;
            background: radial-gradient(circle at center, #001a2e, #000);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .flow-svg { position: absolute; width: 100%; height: 100%; fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.1; }
        #light-essence { position: absolute; width: 15px; height: 15px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px var(--accent); z-index: 100; }
        
        #narrative-box { z-index: 110; text-align: center; padding: 0 40px; margin-top: 150px; }
        .narrative-line { font-size: 1.1rem; letter-spacing: 3px; font-weight: 300; line-height: 2; opacity: 0; margin-bottom: 10px; transition: 0.8s; }

        /* 3. 主殼空間導航 */
        #app-shell { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; opacity: 0; transition: 0.8s cubic-bezier(0.2, 1, 0.2, 1); }
        .shell-spatial { transform: scale(0.88) translateX(60px); filter: blur(10px); pointer-events: none; }

        #sidebar-mask { position: absolute; inset: 0; z-index: 95000; display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        #sidebar { 
            position: absolute; left: -280px; top: 0; width: 280px; height: 100%; 
            background: rgba(0,8,15,0.85); backdrop-filter: blur(40px);
            z-index: 96000; padding: 70px 30px; border-right: 1px solid rgba(255,255,255,0.05);
            transition: 0.6s cubic-bezier(0.2, 1, 0.2, 1); display: flex; flex-direction: column;
        }
        .sidebar-open #sidebar { transform: translateX(280px); }

        /* 4. 印章 UI：虛線變實線外發光 */
        .stamp-slot { 
            width: 32px; height: 32px; border-radius: 50%; 
            border: 1.5px dashed rgba(255,255,255,0.2); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.7rem; color: rgba(255,255,255,0.2); transition: 0.6s;
        }
        .stamp-slot.active { 
            border-style: solid; border-color: var(--accent); 
            color: var(--accent); background: rgba(0, 242, 255, 0.1); 
            animation: glow-outer 3s infinite;
        }

        /* 5. 相簿卡片 */
        .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1500px; }
        #card-3d { width: 320px; height: 500px; transform-style: preserve-3d; display: none; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: 0.8s; }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; background: #fff; padding: 20px; color: #111; border-radius: 2px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        .face-back { transform: rotateY(180deg); background: #fdfbf7; }

        /* 6. 按鈕 UI */
        .btn-ritual {
            width: 85%; padding: 20px; border-radius: 50px; background: var(--accent);
            border: none; color: #000; font-family: 'Montserrat', sans-serif; font-weight: 900;
            font-size: 0.9rem; letter-spacing: 5px; cursor: pointer;
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.3); transition: 0.4s;
            animation: glow-outer 3s infinite; margin-bottom: 50px;
        }
        .btn-ritual.disabled { background: #222; color: #555; box-shadow: none; animation: none; cursor: not-allowed; }
        .mission-check {
            width: 85%;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.75);
        }
        .idle-carousel {
            margin-top: 20px;
            min-height: 52px;
            padding: 0 24px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.45);
        }
        .status-pill {
            margin-top: 8px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--gold);
            font-weight: 900;
        }
        .partner-panel {
            margin-top: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px;
        }
        .partner-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .partner-filters select,
        .partner-filters label {
            font-size: 0.72rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.82);
        }
        .partner-filters select {
            background: #021826;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            padding: 6px 8px;
        }
        .partner-list {
            max-height: 170px;
            overflow-y: auto;
            display: grid;
            gap: 8px;
        }
        .partner-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 9px 10px;
        }
        .partner-item b {
            font-size: 0.82rem;
            letter-spacing: 1px;
        }
        .partner-item small {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.68rem;
        }
        .partner-tags {
            text-align: right;
            min-width: 92px;
        }
        .partner-tag {
            display: inline-block;
            margin-left: 4px;
            margin-top: 2px;
            border-radius: 999px;
            padding: 2px 7px;
            font-size: 0.62rem;
            letter-spacing: 1px;
            background: rgba(0, 242, 255, 0.16);
            border: 1px solid rgba(0, 242, 255, 0.35);
        }
        
        .archive-trigger { position: absolute; bottom: 60px; right: 30px; z-index: 1000; font-size: 1.8rem; color: var(--accent); opacity: 0.6; cursor: pointer; }
    </style>
</head>
<body>

<!-- 入口儀式 -->
<div id="mirror-gate">
    <p style="letter-spacing: 0.8em; font-weight: 300; margin-bottom: 40px; opacity: 0.6;">凝視深海 凝視自己</p>
    <div class="mirror-portal" onclick="window.enterApp()"></div>
    <p style="margin-top: 50px; font-size: 0.7rem; letter-spacing: 4px; opacity: 0.3;">TOUCH TO AWAKEN</p>
</div>

<!-- 動態轉化層 -->
<div id="anim-overlay">
    <svg class="flow-svg"><path id="river-path" d="M250,800 Q150,500 250,200 T250,-100" /></svg>
    <div id="light-essence"></div>
    <div id="narrative-box">
        <div class="narrative-line" id="line-1">光芒從你手裡出發...</div>
        <div class="narrative-line" id="line-2">沿著河海流動，匯入深藍...</div>
        <div class="narrative-line" id="line-3" style="color:var(--accent); font-weight: 900; font-size: 1.4rem;"></div>
        <button id="btn-reveal-final" onclick="window.revealReward()" style="margin-top: 40px; background:none; border:1px solid #fff; color:#fff; padding:12px 35px; border-radius:40px; font-size: 0.7rem; letter-spacing: 3px; cursor:pointer; display:none;">看見守護的回憶</button>
    </div>
</div>

<!-- 側邊欄 -->
<div id="sidebar-mask" onclick="window.toggleSidebar(false)"></div>
<div id="sidebar">
    <div style="text-align: center; margin-bottom: 50px;">
        <div style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin: 0 auto; overflow: hidden; cursor: pointer;" onclick="document.getElementById('avatar-input').click()">
            <img id="u-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=ocean" style="width:100%; height:100%; object-fit: cover;">
        </div>
        <input type="file" id="avatar-input" hidden accept="image/*" onchange="window.saveAvatar(this)">
        <h3 id="u-name" style="margin-top: 15px; font-size: 1.2rem; letter-spacing: 2px;">守護者</h3>
        <p style="font-size: 0.55rem; color: var(--gold); letter-spacing: 3px; font-weight: 900; margin-top: 10px;">ACOLYTE OF THE TIDE</p>
    </div>
    <div onclick="window.toggleGallery(true)" style="padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 0.9rem;"><i class="fa-solid fa-compass" style="margin-right: 15px;"></i> ARCHIVE</div>
    <button onclick="window.exportProgress()" style="color: #8ad4ff; background:none; border:none; margin-top: 18px; font-size: 0.78rem; letter-spacing: 2px; cursor: pointer; text-align: left;">EXPORT PROGRESS JSON</button>
    <button onclick="window.resetData()" style="color: #ff7675; background:none; border:none; margin-top: auto; padding-bottom: 30px; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer;">RESET ALL DATA</button>
</div>

<!-- 主舞台 -->
<div id="app-shell">
    <div style="padding: 60px 30px 20px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <span style="font-size: 0.55rem; letter-spacing: 3px; opacity: 0.4; font-weight: 900;">IMPACT STAMPS</span>
            <div style="display: flex; gap: 10px; margin-top: 10px;" id="stamp-row">
                <div class="stamp-slot">I</div><div class="stamp-slot">II</div><div class="stamp-slot">III</div><div class="stamp-slot">IV</div><div class="stamp-slot">V</div>
            </div>
            <div id="streak-indicator" class="status-pill">STREAK 0 DAY</div>
        </div>
        <i class="fa-solid fa-bars-staggered" onclick="window.toggleSidebar(true)" style="font-size: 1.6rem; color: var(--accent); cursor: pointer;"></i>
    </div>

    <div class="stage">
        <div id="card-3d">
            <div class="card-inner" id="card-inner" onclick="window.flipCard()">
                <div class="card-face">
                    <img id="c-img" style="width:100%; height:280px; object-fit:cover;">
                    <div style="margin-top: 25px;">
                        <h2 id="c-loc" style="margin: 0 0 10px; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px;"></h2>
                        <p id="c-story" style="font-size: 0.9rem; line-height: 2; color: #666; font-style: italic;"></p>
                    </div>
                </div>
                <div class="card-face face-back">
                    <h3 style="margin:0; letter-spacing: 2px; font-weight: 900; color: var(--m-blue);">減塑影響力</h3>
                    <p id="c-impact" style="font-size: 0.85rem; color:#888; margin: 15px 0; line-height: 2;"></p>
                    <div style="margin-top: auto; background: #f1f3f5; padding: 15px; border-radius: 8px; border-left: 5px solid var(--accent); display: flex; align-items: center; gap: 15px;">
                        <img id="c-s-img" src="" style="width:50px; height:50px; border-radius:4px; object-fit:cover;">
                        <div style="flex:1;">
                            <b id="c-s-name" style="font-size: 0.9rem;"></b><br>
                            <small id="c-s-type" style="color:#999; font-size: 0.7rem;"></small>
                        </div>
                    </div>
                    <button onclick="window.saveToArchive(event)" style="margin-top: 25px; width: 100%; padding: 18px; background: var(--m-black); color: #fff; border: none; font-weight: 900; letter-spacing: 4px; font-size: 0.75rem;">COLLECT ARCHIVE</button>
                </div>
            </div>
        </div>
        <div id="empty-hint" style="text-align: center; opacity: 0.1;">
            <i class="fa-solid fa-qrcode" style="font-size: 4rem; margin-bottom: 20px;"></i>
            <p style="letter-spacing: 5px; font-size: 0.8rem;">WAITING FOR MISSION</p>
            <div id="idle-carousel" class="idle-carousel">
                <span id="idle-text">你家排水孔 → 淡水河 → 台灣海峽。</span>
            </div>
        </div>
    </div>

    <div style="text-align: center; padding-bottom: 40px;">
        <label class="mission-check">
            <input type="checkbox" id="mission-verified">
            <span>我已完成自備（杯 / 袋 / 餐具）</span>
        </label>
        <button id="draw-btn" class="btn-ritual" onclick="window.startAction()">START RITUAL</button>
    </div>

    <i class="fa-solid fa-box-archive archive-trigger" id="archive-icon" onclick="window.toggleGallery(true)"></i>
</div>

<!-- 圖鑑 Modal -->
<div id="map-modal" style="position: absolute; inset: 0; background: var(--m-black); z-index: 110000; display: none; flex-direction: column; padding: 60px 30px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 40px;">
        <h2 style="letter-spacing: 5px; font-weight: 900;">ARCHIVE</h2>
        <i class="fa-solid fa-xmark" onclick="window.toggleGallery(false)" style="font-size: 2.5rem; opacity: 0.3;"></i>
    </div>
    <div style="height: 42%; position: relative;">
        <svg viewBox="0 0 400 600" id="taiwan-map" style="width:100%; height:100%;">
            <path d="M220,20 L280,30 L320,60 L340,120 L310,250 L270,450 L220,550 L150,550 L100,450 L80,300 L120,100 L180,30 Z" fill="rgba(255,255,255,0.02)" stroke="#fff" stroke-width="0.5"/>
        </svg>
    </div>
    <div class="partner-panel">
        <div style="font-size: 0.74rem; letter-spacing: 2px; opacity: 0.66; margin-bottom: 8px;">PARTNER MAP + FILTER</div>
        <div class="partner-filters">
            <select id="region-filter" onchange="window.renderPartnerMvp()">
                <option value="all">全部區域</option>
                <option value="north">北部</option>
                <option value="east">東部</option>
                <option value="island">離島</option>
            </select>
            <select id="scope-filter" onchange="window.renderPartnerMvp()">
                <option value="all">全部店家</option>
                <option value="current">目前海域附近</option>
            </select>
            <label><input type="checkbox" id="discount-filter" onchange="window.renderPartnerMvp()"> 有折扣</label>
            <label><input type="checkbox" id="reuse-filter" onchange="window.renderPartnerMvp()"> 免一次性餐具</label>
        </div>
        <div id="partner-caption" style="font-size: 0.68rem; color: rgba(255,255,255,0.55); margin-bottom: 8px;"></div>
        <div id="partner-list" class="partner-list"></div>
    </div>
</div>

<script>
    gsap.registerPlugin(MotionPathPlugin);

    const COAST_DATA = [
        { id:'kl1',loc:'基隆嶼海域',region:'north',x:280,y:40,p:0.45, story:'這裡有你小時候看過的海龜，因為你的自備，今天減少了塑膠進入。謝謝你！', trivia:'龍蝦棲息地。', img:'https://images.unsplash.com/photo-1505118380757-91f5f45d8de4?w=800', shop:'小島咖啡', type:'Friendly Cafe', simg:'https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=100' },
        { id:'td1',loc:'台東三仙台',region:'east',x:260,y:460,p:0.38, story:'太平洋的第一道曙光，因為你的守護而更加明亮。', trivia:'八拱橋地標。', img:'https://images.unsplash.com/photo-1520113526514-99dec0cb393d?w=800', shop:'成功民宿', type:'Green Inn', simg:'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=100' },
        { id:'ph1',loc:'澎湖七美',region:'island',x:40,y:300,p:0.52, story:'雙心石滬的智慧，需要我們這一代繼續傳承守護。', trivia:'石滬傳統漁法。', img:'https://images.unsplash.com/photo-1538332576228-eb5b4c4de6f5?w=800', shop:'七美舍', type:'Local Hub', simg:'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=100' }
    ];
    const SHOP_DATA = [
        { id:'s1', coastId:'kl1', name:'小島咖啡', type:'Friendly Cafe', region:'north', discount:true, noSingleUse:true, note:'自備杯折 10 元' },
        { id:'s2', coastId:'kl1', name:'潮見食堂', type:'Eco Bistro', region:'north', discount:false, noSingleUse:true, note:'內用不主動提供一次性餐具' },
        { id:'s3', coastId:'td1', name:'成功民宿', type:'Green Inn', region:'east', discount:true, noSingleUse:false, note:'續住不更換備品折扣' },
        { id:'s4', coastId:'td1', name:'海光早餐', type:'Local Food', region:'east', discount:false, noSingleUse:true, note:'自備餐盒可外帶' },
        { id:'s5', coastId:'ph1', name:'七美舍', type:'Local Hub', region:'island', discount:true, noSingleUse:true, note:'自備容器加贈飲品' }
    ];

    const KEY_DRAW_DATE = 'muse_drawn_date_v27';
    const KEY_STAMPS = 'muse_stamps_v27';
    const KEY_UNLOCKED = 'muse_unlocked_v27';
    const KEY_ACTIONS_BY_DATE = 'muse_actions_by_date_v27';

    let unlocked = JSON.parse(localStorage.getItem(KEY_UNLOCKED)) || [];
    let stamps = parseInt(localStorage.getItem(KEY_STAMPS)) || 0;
    let actionsByDate = JSON.parse(localStorage.getItem(KEY_ACTIONS_BY_DATE) || '{}');
    let current = null;
    let idleTimer = null;

    function todayKey() {
        return new Date().toLocaleDateString('sv-SE');
    }

    function hasDrawnToday() {
        return localStorage.getItem(KEY_DRAW_DATE) === todayKey();
    }

    function registerTodayAction() {
        const t = todayKey();
        actionsByDate[t] = (actionsByDate[t] || 0) + 1;
        localStorage.setItem(KEY_ACTIONS_BY_DATE, JSON.stringify(actionsByDate));
    }

    function computeStreakDays() {
        let streak = 0;
        const cursor = new Date();
        while (true) {
            const dateKey = cursor.toLocaleDateString('sv-SE');
            if (!actionsByDate[dateKey]) break;
            streak += 1;
            cursor.setDate(cursor.getDate() - 1);
        }
        return streak;
    }

    function updateStreakUI() {
        const streak = computeStreakDays();
        const label = streak <= 1 ? 'DAY' : 'DAYS';
        document.getElementById('streak-indicator').innerText = `STREAK ${streak} ${label}`;
    }

    function buildIdleMessages() {
        const finishedCoasts = unlocked.length;
        return [
            '你家排水孔 → 淡水河 → 台灣海峽。',
            `今日已累積 ${stamps} 枚守護印章。`,
            `你已解鎖 ${finishedCoasts} / ${COAST_DATA.length} 海域故事。`,
            `海域知識：${COAST_DATA[Math.floor(Math.random() * COAST_DATA.length)].trivia}`
        ];
    }

    function startIdleCarousel() {
        const idleText = document.getElementById('idle-text');
        if (!idleText) return;
        const rotate = () => {
            const messages = buildIdleMessages();
            idleText.innerText = messages[Math.floor(Math.random() * messages.length)];
        };
        rotate();
        clearInterval(idleTimer);
        idleTimer = setInterval(rotate, 6000);
    }

    function unlockDraw() {
        const btn = document.getElementById('draw-btn');
        btn.classList.remove('disabled');
        btn.innerText = 'START RITUAL';
    }

    function getTargetCoastId() {
        if (current?.id) return current.id;
        if (unlocked.length > 0) return unlocked[unlocked.length - 1];
        return null;
    }

    function regionLabel(region) {
        if (region === 'north') return '北部';
        if (region === 'east') return '東部';
        if (region === 'island') return '離島';
        return '未知';
    }

    window.enterApp = () => {
        gsap.to("#mirror-gate", { opacity: 0, scale: 2, duration: 1.5, ease: "power4.inOut", onComplete: () => {
            document.getElementById('mirror-gate').style.display = 'none';
            gsap.to("#app-shell", { opacity: 1, duration: 1 });
            updateStampUI();
            startIdleCarousel();
            if (hasDrawnToday()) lockDraw();
            else unlockDraw();
        }});
    };

    // --- 敘事節奏動畫 ---
    window.startAction = () => {
        if (hasDrawnToday()) return;
        const missionVerified = document.getElementById('mission-verified').checked;
        if (!missionVerified) {
            alert('請先勾選「我已完成自備」後再開始任務。');
            return;
        }
        current = COAST_DATA[Math.floor(Math.random()*COAST_DATA.length)];
        const overlay = document.getElementById('anim-overlay');
        overlay.style.display = 'flex';
        
        const photon = document.getElementById('light-essence');
        const tl = gsap.timeline();

        // 1. 光芒出發
        gsap.to("#line-1", { opacity: 1, y: -10, duration: 1 });
        
        tl.fromTo(photon, { top: "90%", left: "50%", scale: 1, opacity: 1 }, { 
            motionPath: { path: "#river-path", align: "#river-path", alignOrigin: [0.5, 0.5] },
            duration: 3, ease: "power2.inOut" 
        })
        .add(() => {
            gsap.to("#line-1", { opacity: 0, duration: 0.5 });
            gsap.to("#line-2", { opacity: 1, y: -10, delay: 0.5, duration: 1 });
        })
        .to(photon, { scale: 50, opacity: 0, duration: 0.8, delay: 0.5 })
        .add(() => {
            gsap.to("#line-2", { opacity: 0, duration: 0.5 });
            const line3 = document.getElementById('line-3');
            line3.innerText = "你現在守護的是：" + current.loc;
            gsap.to(line3, { opacity: 1, y: -10, duration: 1 });
            document.getElementById('btn-reveal-final').style.display = 'inline-block';
        });
    };

    window.revealReward = () => {
        gsap.to("#anim-overlay", { opacity: 0, duration: 0.8, onComplete: () => {
            document.getElementById('anim-overlay').style.display = 'none';
            document.getElementById('anim-overlay').style.opacity = 1;
            document.querySelectorAll('.narrative-line').forEach(l => l.style.opacity = 0);
            document.getElementById('btn-reveal-final').style.display = 'none';
            showCard();
        }});
    };

    function showCard() {
        document.getElementById('empty-hint').style.display = 'none';
        document.getElementById('card-3d').style.display = 'block';
        document.getElementById('c-img').src = current.img;
        document.getElementById('c-loc').innerText = current.loc;
        document.getElementById('c-story').innerText = current.story;
        document.getElementById('c-impact').innerText = `此次行動減少了 ${current.p}g 塑膠進入這片海。${current.trivia}`;
        document.getElementById('c-s-name').innerText = current.shop;
        document.getElementById('c-s-type').innerText = current.type;
        document.getElementById('c-s-img').src = current.simg;

        gsap.fromTo("#card-3d", { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.2, ease: "elastic.out(1, 0.6)" });
        localStorage.setItem(KEY_DRAW_DATE, todayKey());
        lockDraw();
    }

    function lockDraw() {
        const btn = document.getElementById('draw-btn');
        btn.classList.add('disabled');
        btn.innerText = "今日守護已達成";
    }

    // --- 印章與入庫 ---
    window.saveToArchive = (e) => {
        e.stopPropagation();
        const card = document.getElementById('card-3d');
        const icon = document.getElementById('archive-icon');
        const rect = icon.getBoundingClientRect();

        stamps++; if(stamps > 5) stamps = 5;
        localStorage.setItem(KEY_STAMPS, stamps);
        registerTodayAction();
        updateStampUI();
        document.getElementById('mission-verified').checked = false;

        gsap.to(card, {
            x: rect.left - card.offsetLeft - 150,
            y: rect.top - card.offsetTop - 250,
            scale: 0, opacity: 0, duration: 1.2, ease: "power3.inOut",
            onComplete: () => {
                card.style.display = 'none';
                icon.classList.add('highlight');
                setTimeout(() => icon.classList.remove('highlight'), 500);
                document.getElementById('empty-hint').innerHTML = `<i class="fa-solid fa-circle-check" style="font-size:4rem; color:var(--accent); margin-bottom:20px;"></i><p>感謝守護，碎片已入庫</p>`;
                if(!unlocked.includes(current.id)) unlocked.push(current.id);
                localStorage.setItem(KEY_UNLOCKED, JSON.stringify(unlocked));
            }
        });
    };

    window.toggleSidebar = (on) => {
        const shell = document.getElementById('app-shell');
        const mask = document.getElementById('sidebar-mask');
        if(on) { mask.style.display='block'; gsap.to(mask,{opacity:1}); shell.classList.add('shell-spatial'); document.body.classList.add('sidebar-open'); }
        else { gsap.to(mask,{opacity:0, onComplete:()=>mask.style.display='none'}); shell.classList.remove('shell-spatial'); document.body.classList.remove('sidebar-open'); }
    };

    function updateStampUI() {
        const slots = document.querySelectorAll('.stamp-slot');
        slots.forEach((s, i) => { if(i < stamps) s.classList.add('active'); });
        updateStreakUI();
    }

    window.toggleGallery = (on) => {
        const m = document.getElementById('map-modal');
        if(on) { m.style.display='flex'; window.renderPartnerMvp(); gsap.from(m,{y:"100%"}); }
        else { gsap.to(m,{y:"100%", onComplete:()=> m.style.display='none'}); }
    };

    function renderMap(visibleCoastIds) {
        const svg = document.getElementById('taiwan-map');
        svg.querySelectorAll('.m-dot').forEach(d => d.remove());
        COAST_DATA.forEach(p => {
            const has = unlocked.includes(p.id);
            const visible = !visibleCoastIds || visibleCoastIds.has(p.id);
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", p.x); c.setAttribute("cy", p.y);
            c.setAttribute("r", visible ? (has ? 10 : 5) : 4);
            c.setAttribute("class", `m-dot`);
            c.style.fill = has ? 'var(--accent)' : '#111';
            c.style.stroke = has ? '#fff' : 'rgba(255,255,255,0.1)';
            c.style.opacity = visible ? '1' : '0.25';
            svg.appendChild(c);
        });
    }

    window.renderPartnerMvp = () => {
        const region = document.getElementById('region-filter').value;
        const scope = document.getElementById('scope-filter').value;
        const withDiscount = document.getElementById('discount-filter').checked;
        const withReuse = document.getElementById('reuse-filter').checked;
        const targetCoastId = getTargetCoastId();

        let items = SHOP_DATA.filter((shop) => {
            if (region !== 'all' && shop.region !== region) return false;
            if (withDiscount && !shop.discount) return false;
            if (withReuse && !shop.noSingleUse) return false;
            if (scope === 'current' && shop.coastId !== targetCoastId) return false;
            return true;
        });

        const caption = document.getElementById('partner-caption');
        if (scope === 'current' && !targetCoastId) {
            caption.innerText = '目前海域附近：請先完成一次任務後使用此篩選。';
            items = [];
        } else if (scope === 'current') {
            const target = COAST_DATA.find((c) => c.id === targetCoastId);
            caption.innerText = `目前海域附近：${target ? target.loc : '未知海域'}`;
        } else {
            caption.innerText = `全部店家：共 ${items.length} 筆符合條件`;
        }

        const list = document.getElementById('partner-list');
        if (items.length === 0) {
            list.innerHTML = '<div style="opacity:0.5; font-size:0.76rem; padding: 8px;">沒有符合條件的店家</div>';
            renderMap(new Set());
            return;
        }

        list.innerHTML = items.map((shop) => `
            <div class="partner-item">
                <div>
                    <b>${shop.name}</b><br>
                    <small>${shop.type} / ${regionLabel(shop.region)}</small><br>
                    <small>${shop.note}</small>
                </div>
                <div class="partner-tags">
                    ${shop.discount ? '<span class="partner-tag">折扣</span>' : ''}
                    ${shop.noSingleUse ? '<span class="partner-tag">免一次性</span>' : ''}
                </div>
            </div>
        `).join('');

        renderMap(new Set(items.map((shop) => shop.coastId)));
    };

    window.resetData = () => {
        if(confirm("重置所有數據？")) { localStorage.clear(); location.reload(); }
    };

    window.exportProgress = () => {
        const payload = {
            exportedAt: new Date().toISOString(),
            stamps,
            unlocked,
            actionsByDate,
            todayDrawn: hasDrawnToday()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `impact-sea-progress-${todayKey()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    };

    window.saveAvatar = (i) => {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById('u-avatar').src = e.target.result;
        reader.readAsDataURL(i.files[0]);
    };

    window.flipCard = () => { const inner = document.getElementById('card-inner'); const rot = gsap.getProperty(inner, "rotationY"); gsap.to(inner, { rotationY: rot === 180 ? 0 : 180, duration: 0.6 }); };
</script>
</body>
</html>
